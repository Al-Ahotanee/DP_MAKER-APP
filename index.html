<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventDP | Create Your Campaign DP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <style>
      :root { --bg: #f8f8f8; --fg: #0a0a0a; }
      .dark { --bg: #0a0a0a; --fg: #f8f8f8; }
      body { background-color: var(--bg); color: var(--fg); font-family: 'DM Sans', sans-serif; transition: background-color 0.3s; margin: 0; }
      .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
      .btn-gold { background: linear-gradient(135deg, #f59e0b, #d97706); color: #0a0a0a; font-weight: 700; transition: transform 0.2s, box-shadow 0.2s; }
      .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(245,158,11,0.35); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/App.tsx"></script>
  </body>
</html>
